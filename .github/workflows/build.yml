name: Build static site

# Build wiki/ -> site/ with MkDocs, then publish in two parallel forms:
#
#   1. force-push to a dedicated `site` branch (internal nginx box does
#      `git fetch && git reset --hard origin/site` on its own cron);
#   2. attach `llm-wiki-site.tar.gz` to a GitHub workflow artifact + a
#      "site-latest" rolling release (cron on the internal box can curl
#      the tarball without git auth).
#
# The internal hosting box only needs outbound HTTPS to github.com.

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - 'scripts/build_site.py'
      - '.github/workflows/build.yml'
  schedule:
    - cron: "37 5 * * *"      # daily, after anneal at 04:43
  workflow_dispatch: {}

permissions:
  contents: write             # push to site branch + manage releases

concurrency:
  group: site-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-docs.txt

      - name: Install MkDocs and plugins
        run: pip install -r requirements-docs.txt

      - name: Preflight
        run: python -m scripts.build_site --preflight

      - name: Build (strict)
        run: python -m scripts.build_site --clean --strict

      # ---- form 1: force-push to `site` branch -----------------------
      - name: Publish to `site` branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Build a brand-new commit each time (no history on `site`).
          tmp=$(mktemp -d)
          cp -r site/. "$tmp/"
          cd "$tmp"
          git init -q -b site
          git config user.name  "code-llm-wiki bot"
          git config user.email "bot@users.noreply.github.com"
          git add .
          git commit -q -m "site: build ${GITHUB_SHA::7}"
          git push --force \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            HEAD:refs/heads/site

      # ---- form 2: tarball as artifact + rolling release -------------
      - name: Package tarball
        run: tar czf llm-wiki-site.tar.gz -C site .

      - uses: actions/upload-artifact@v4
        with:
          name: site-html
          path: llm-wiki-site.tar.gz
          retention-days: 14

      - name: Update rolling `site-latest` release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if gh release view site-latest >/dev/null 2>&1; then
            gh release delete-asset site-latest llm-wiki-site.tar.gz -y \
              || true
            gh release upload site-latest llm-wiki-site.tar.gz
            gh release edit site-latest \
              --notes "Built from ${GITHUB_SHA} at $(date -u +%FT%TZ)"
          else
            gh release create site-latest llm-wiki-site.tar.gz \
              --title "site-latest" \
              --notes "Built from ${GITHUB_SHA} at $(date -u +%FT%TZ)"
          fi

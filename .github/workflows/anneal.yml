name: Annealing (cron)

# Daily: detect drift / stale pages / broken wiki-links, repair the top N
# within a token budget. Opens a PR — same rule as sync: humans review.

on:
  schedule:
    - cron: "43 4 * * *"      # 04:43 UTC daily
  workflow_dispatch:
    inputs:
      budget:
        description: "Max pages to repair this run"
        default: "5"
      max_age_days:
        description: "stale_page threshold (days since last_synced)"
        default: "14"

env:
  KERNEL_REPO_URL: ${{ vars.KERNEL_REPO_URL || 'https://github.com/torvalds/linux' }}
  KERNEL_BRANCH:   ${{ vars.KERNEL_BRANCH   || 'master' }}
  KERNEL_SPARSE:   ${{ vars.KERNEL_SPARSE   || 'mm net/core' }}
  LLM_PROFILE:     ${{ vars.LLM_PROFILE     || 'claude' }}

permissions:
  contents: write
  pull-requests: write

jobs:
  anneal:
    runs-on: ubuntu-latest
    concurrency:
      group: kernel-anneal
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Cache kernel git dir
        uses: actions/cache@v4
        with:
          path: raw/linux/.git
          key: kernel-${{ env.KERNEL_BRANCH }}-anneal-${{ github.run_id }}
          restore-keys: |
            kernel-${{ env.KERNEL_BRANCH }}-

      - name: Clone or refresh kernel (blobless + sparse)
        run: |
          set -euo pipefail
          if [ ! -d raw/linux/.git ]; then
            mkdir -p raw
            git clone --filter=blob:none --no-checkout \
              "${KERNEL_REPO_URL}" raw/linux
          fi
          cd raw/linux
          git sparse-checkout init --cone
          # shellcheck disable=SC2086
          git sparse-checkout set ${KERNEL_SPARSE}
          git fetch --depth=2000 origin "${KERNEL_BRANCH}"
          git checkout -B "${KERNEL_BRANCH}" "origin/${KERNEL_BRANCH}"

      - name: Scan (always; prints the inventory in logs)
        run: |
          python -m scripts.anneal scan \
            --max-age-days "${{ github.event.inputs.max_age_days || '14' }}"

      - name: Repair top-N
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
        run: |
          python -m scripts.anneal run \
            --budget "${{ github.event.inputs.budget || '5' }}" \
            --max-age-days "${{ github.event.inputs.max_age_days || '14' }}" \
            --profile "${LLM_PROFILE}"

      - name: Open / update PR if wiki changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if git diff --quiet wiki/ ; then
            echo "Anneal found nothing to repair this run."
            exit 0
          fi
          git config user.name  "code-llm-wiki bot"
          git config user.email "bot@users.noreply.github.com"
          git checkout -B bot/anneal
          git add wiki/
          git commit -m "wiki: annealing (drift / stale / broken-link repair)"
          git push --force-with-lease origin bot/anneal
          if ! gh pr view bot/anneal --json number >/dev/null 2>&1; then
            gh pr create --base main --head bot/anneal \
              --title "Anneal: drift / stale / broken-link repair" \
              --body  "Auto-generated by .github/workflows/anneal.yml. Inspect the diff against current source before merging."
          else
            echo "PR already open; force-pushed updated commit."
          fi

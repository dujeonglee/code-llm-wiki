name: Kernel sync (cron)

# Hourly: fetch new kernel commits, route to affected wiki pages, ask the
# LLM to patch them. Opens a PR against main — per CLAUDE.md rule 5
# ("자동화는 PR로"), wiki/ never lands on main without human review.

on:
  schedule:
    - cron: "17 * * * *"     # offset 17 min to avoid the :00 spike
  workflow_dispatch: {}

env:
  KERNEL_REPO_URL: ${{ vars.KERNEL_REPO_URL || 'https://github.com/torvalds/linux' }}
  KERNEL_BRANCH:   ${{ vars.KERNEL_BRANCH   || 'master' }}
  # space-separated sparse-checkout paths; trim to what your wiki covers
  KERNEL_SPARSE:   ${{ vars.KERNEL_SPARSE   || 'mm net/core' }}
  LLM_PROFILE:     ${{ vars.LLM_PROFILE     || 'claude' }}

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    concurrency:
      group: kernel-sync          # never two sync jobs racing
      cancel-in-progress: false
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # need full history to push to bot/sync

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache kernel git dir
        uses: actions/cache@v4
        with:
          path: raw/linux/.git
          key:   kernel-${{ env.KERNEL_BRANCH }}-${{ github.run_id }}
          restore-keys: |
            kernel-${{ env.KERNEL_BRANCH }}-

      - name: Clone or refresh kernel (blobless + sparse)
        run: |
          set -euo pipefail
          if [ ! -d raw/linux/.git ]; then
            mkdir -p raw
            git clone --filter=blob:none --no-checkout \
              "${KERNEL_REPO_URL}" raw/linux
          fi
          cd raw/linux
          git sparse-checkout init --cone
          # shellcheck disable=SC2086  # word-splitting intentional
          git sparse-checkout set ${KERNEL_SPARSE}
          git fetch --depth=2000 origin "${KERNEL_BRANCH}"
          git checkout -B "${KERNEL_BRANCH}" "origin/${KERNEL_BRANCH}"
          echo "HEAD=$(git rev-parse HEAD)"

      - name: Sync + route
        run: |
          set -euo pipefail
          python -m scripts.sync_kernel --no-fetch \
            --branch "${KERNEL_BRANCH}" --out /tmp/manifest.json
          python -m scripts.patch_router \
            --manifest /tmp/manifest.json --apply --out /tmp/routing.json
          echo "--- routing.json ---"
          cat /tmp/routing.json

      - name: Update affected pages (LLM)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          AFFECTED=$(python -c "import json; print(len(json.load(open('/tmp/routing.json'))['affected_pages']))")
          if [ "$AFFECTED" -eq 0 ]; then
            echo "No affected pages this cycle; recording new HEAD only."
            python -m scripts.sync_kernel --no-fetch --record \
              --branch "${KERNEL_BRANCH}" > /dev/null
            exit 0
          fi
          python -m scripts.update_wiki update \
            --routing /tmp/routing.json --profile "${LLM_PROFILE}"

      - name: Open / update PR if wiki changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if git diff --quiet wiki/ ; then
            echo "No wiki changes; nothing to PR."
            exit 0
          fi
          git config user.name  "code-llm-wiki bot"
          git config user.email "bot@users.noreply.github.com"
          git checkout -B bot/sync
          git add wiki/
          git commit -m "wiki: cron sync from kernel ${KERNEL_BRANCH}"
          git push --force-with-lease origin bot/sync
          # Open the PR if there isn't one already.
          if ! gh pr view bot/sync --json number >/dev/null 2>&1; then
            gh pr create --base main --head bot/sync \
              --title "Cron sync: ${KERNEL_BRANCH} kernel patches → wiki" \
              --body  "Auto-generated by .github/workflows/sync.yml. Review the diff and merge if it looks right."
          else
            echo "PR already open; force-pushed updated commit."
          fi
